<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI YT Master - Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">AI YT Master</div>
        <nav>
            <button class="tab-btn active" onclick="showTab('growth')">📈 채널 성장</button>
            <button class="tab-btn" onclick="showTab('shorts')">📱 쇼츠 생성</button>
            <button class="tab-btn" onclick="showTab('longform')">🎥 롱폼 생성</button>
            <button class="tab-btn" onclick="showTab('trends')">🔥 트렌드 분석</button>
        </nav>
        <div class="user-info">
            <span id="userEmail">user@example.com</span>
            <button onclick="logout()">로그아웃</button>
        </div>
    </div>

    <main class="content">
        <!-- Tab 1: Growth -->
        <section id="growth" class="tab-content active">
            <h2>유튜브 채널 브랜딩</h2>
            <div class="card">
                <input type="text" id="channelTopic" placeholder="채널 주제 (예: AI 뉴스, 명언)">
                <button onclick="generateBranding()">브랜딩 패키지 생성</button>
                <div id="brandingResult" class="result-area"></div>
            </div>
        </section>

        <!-- Tab 2: Shorts -->
        <section id="shorts" class="tab-content">
            <h2>AI 고화질 쇼츠 제작</h2>
            <div class="card">
                <textarea id="shortsPrompt" placeholder="쇼츠 대본을 입력하세요..."></textarea>
                <div class="options">
                    <label>음성 선택: <select id="voiceModel"><option>XTTS-Korean-Male</option></select></label>
                </div>
                <button onclick="startShortsGen()" class="btn-generate">Wan 2.1 + XTTS 생성 시작</button>
                <div id="shortsProgress"></div>
            </div>
        </section>

        <!-- Tab 3: Longform -->
        <section id="longform" class="tab-content">
            <h2>롱폼 비디오 합성</h2>
            <div class="card">
                <p>업로드된 쇼츠 소스들을 DaVinci Resolve 엔진으로 병합합니다.</p>
                <div id="fileList"></div>
                <button onclick="compileLongform()">롱폼 영상 렌더링</button>
            </div>
        </section>

        <!-- Tab 4: Trends -->
        <section id="trends" class="tab-content">
            <h2>실시간 유튜브 트렌드</h2>
            <div id="trendGrid" class="grid">
                <!-- 트렌드 키워드 카드가 들어갈 자리 -->
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
