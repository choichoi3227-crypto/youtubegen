<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - AI YT Master</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h1>Create Account</h1>
        <form id="signupForm">
            <input type="email" id="newEmail" placeholder="이메일" required>
            <input type="password" id="newPassword" placeholder="비밀번호" required>
            <button type="submit" class="btn-primary">가입하기</button>
        </form>
        <p>이미 계정이 있나요? <a href="/login.html">로그인</a></p>
    </div>
    <script src="/app.js"></script>
</body>
</html>
